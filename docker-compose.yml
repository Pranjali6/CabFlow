services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cabflow-dashboard
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OMP_NUM_THREADS=2
    volumes:
      - model-data:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: cabflow-api
    ports:
      - "8000:8000"
    environment:
      - OMP_NUM_THREADS=2
    volumes:
      - model-data:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: cabflow-mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    volumes:
      - mlflow-data:/mlflow
    restart: unless-stopped

volumes:
  model-data:
  mlflow-data:
