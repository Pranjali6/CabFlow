# Theme follows the user's OS preference (Mac System Settings > Appearance).
# To force a specific theme instead, uncomment one of these blocks.
#
# --- Force light ---
# [theme]
# base = "light"
#
# --- Force dark ---
# [theme]
# base = "dark"

[theme]
primaryColor = "#f39c12"
font = "sans serif"

[server]
maxUploadSize = 200
enableCORS = false

[browser]
gatherUsageStats = false
