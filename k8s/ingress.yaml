apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cabflow-ingress
  namespace: cabflow
  labels:
    app: cabflow
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/websocket-services: cabflow-dashboard
spec:
  ingressClassName: nginx
  rules:
    - host: cabflow.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cabflow-dashboard
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: cabflow-api
                port:
                  number: 80
