apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cabflow-api-hpa
  namespace: cabflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cabflow-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cabflow-dashboard-hpa
  namespace: cabflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cabflow-dashboard
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
